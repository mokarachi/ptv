<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PTV Report</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background: linear-gradient(135deg, #dbeafe, #fef3c7);
}

.container{
  max-width: 1000px;
  margin: 30px auto;
  background: #ffffff;
  border-radius: 14px;
  padding: 25px 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
}

h2{
  text-align:center;
  margin-top:0;
  color:#1f2937;
}

p{
  font-size:14px;
  color:#1f2937;
  background:#f9fafb;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #e5e7eb;
}

textarea{
  width:100%;
  height:250px;
  margin-top:10px;
  padding:10px;
  font-family: monospace;
  font-size:14px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#fdfdfd;
}
textarea:focus{
  outline:none;
  border-color:#60a5fa;
  box-shadow:0 0 0 2px rgba(96,165,250,0.3);
}

button{
  margin-top:12px;
  margin-right:10px;
  padding:8px 16px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-size:14px;
  cursor:pointer;
  transition: all 0.2s ease;
}
button:hover{
  background:#2563eb;
  transform: translateY(-1px);
}
button:active{
  transform: translateY(0);
}

#output{
  margin-top:15px;
  overflow:auto;
}

table{
  border-collapse: collapse;
  width: 100%;
  font-family: 'Courier New', monospace;
  font-size:12px;
  line-height:1.2;
  background:#f9fafb;
  color:#111827;
  border:2px solid #111827; /* strong outer border */
}

th, td{
  border: 1px solid #111827; /* visible cell borders */
  padding: 8px;
  text-align:center;
}

th{
  background:#3b82f6;
  color:#fff;
}

.missing{
  color:#dc2626;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<a href="https://pmdnmcc.net/websites/DownloadNMCCData.aspx" target="_blank" class="top-link">
   Download NMCC Data
</a>
<h2>PTV Report</h2>

<p><strong>Instructions:</strong> Paste all SYNOP messages (both
Minimum and Maximum Temperature groups) in the single box below. RH
will be extracted corresponding to each temperature group and carried
forward if missing.</p>

<textarea id="synopInput" placeholder="Paste all SYNOP messages here"></textarea>
<br>
<button id="submitBtn">Submit</button>
<button id="downloadBtn">Download TXT</button>
<button id="copyBtn">Copy Table</button>

<div id="output"></div>

</div>

<script>
// Station order and names
const stationOrder = [
"41780","41783","41785","41764","41766","41743","41767","41768",
"41786","41749","41746","41745","41724","41725","41726","41748",
"41747","41715","417--","41781","41779"
];

const stations = {
"41780":"Karachi","41783":"Thatta","41785":"Badin","41764":"Hyderabad","41766":"Tandojam",
"41743":"Dadu","41767":"MirpurKhas","41768":"Chhor","41786":"Mithi","41749":"Sh. Benazirabad",
"41746":"Padidan","41745":"Sakrand","41724":"Sukkur","41725":"Rohri","41726":"Khairpur",
"41748":"Larkana","41747":"MoenjoDaro","41715":"Jacobabad","417--":"JIAP",
"41781":"PAF Faisal","41779":"PAF Masroor"
};

let processedText = "";

// Decode temperature from SYNOP group
function decodeTemp(group) {
  if(!group || group.length<5) return "-----";
  const signDigit = group[1];
  const tempDigits = group.slice(2,5);
  const sign = signDigit === "1" ? "-" : "+";
  const temp = parseInt(tempDigits,10)/10;
  return parseFloat(sign + temp);
}

// Extract data from single SYNOP text box
function extractData(inputText) {
  const rows = {};
  const rhCarry = {};
  const lines = inputText.split(/\n/);

  lines.forEach(line => {
    line = line.trim();
    if(!line) return;

    const match = line.match(/\b(417\d{2}|417--)\b/);
    if(!match) return;
    const code = match[0];
    const station = stations[code] || code;

    if(!rows[code]) rows[code] = {Station: station, SYNOP_Code: code,
      Min_Temp:"-----", RH_min:"-----", Max_Temp:"-----", RH_max:"-----", Forecast:""};

    // RH extraction
    let rh = "-----";
    let rhMatch = line.match(/RH\s*(\d{1,3})/i);
    if(rhMatch){
      rh = rhMatch[1];
      rhCarry[code] = rh;
    } else {
      let percentMatch = line.match(/(\d{2})%/);
      if(percentMatch){
        rh = percentMatch[1];
        rhCarry[code] = rh;
      } else if(rhCarry[code]){
        rh = rhCarry[code];
      }
    }

    const tempGroups = line.match(/333\s+(\d{5})/g);
    if(tempGroups){
      tempGroups.forEach(g => {
        const codeGroup = g.split(/\s+/)[1];
        const tempValue = decodeTemp(codeGroup).toFixed(1);
        if(codeGroup[0]==="2"){
          rows[code].Min_Temp = tempValue;
          rows[code].RH_min = rh;
        } else if(codeGroup[0]==="1"){
          rows[code].Max_Temp = tempValue;
          rows[code].RH_max = rh;
        }
      });
    }
  });

  return rows;
}

function processData(){
  const synopText = document.getElementById("synopInput").value;
  const allRows = extractData(synopText);

  const header = ["Station","SYNOP_Code","Min_Temp","RH_min","Max_Temp","RH_max","Forecast"];

  let htmlOut = "<table><tr>";
  header.forEach(h=>htmlOut+="<th>"+h+"</th>");
  htmlOut += "</tr>";

  let outText = header.join(" ")+"\n";

  stationOrder.forEach(code => {
    const rowData = allRows[code] || {};
    const row = {
      Station: rowData.Station || code,
      SYNOP_Code: code,
      Min_Temp: rowData.Min_Temp || "-----",
      RH_min: rowData.RH_min || "-----",
      Max_Temp: rowData.Max_Temp || "-----",
      RH_max: rowData.RH_max || "-----",
      Forecast: rowData.Forecast || ""
    };

    htmlOut += "<tr>";
    Object.values(row).forEach(c=>{
      if(c==="-----") htmlOut+="<td class='missing'>"+c+"</td>";
      else htmlOut+="<td>"+c+"</td>";
    });
    htmlOut += "</tr>";

    outText += Object.values(row).join(" ")+"\n";
  });

  htmlOut += "</table>";
  processedText = outText;
  document.getElementById("output").innerHTML = htmlOut;
}

// Auto-copy table after submit
document.getElementById("submitBtn").addEventListener("click", () => {
  processData();
  const outputDiv = document.getElementById("output");
  if(outputDiv.innerHTML){
    const blob = new Blob([outputDiv.innerHTML], { type: "text/html" });
    const item = new ClipboardItem({ "text/html": blob });
    navigator.clipboard.write([item]).catch(err => console.error("Clipboard copy failed:", err));
  }
});




// Manual copy button
document.getElementById("copyBtn").addEventListener("click", () => {
  const outputDiv = document.getElementById("output");
  if(outputDiv.innerHTML){
    const blob = new Blob([outputDiv.innerHTML], { type: "text/html" });
    const item = new ClipboardItem({ "text/html": blob });
    navigator.clipboard.write([item]).catch(err => console.error("Clipboard copy failed:", err));
  }
});

// Download TXT button
document.getElementById("downloadBtn").addEventListener("click", function(){
  if(!processedText){ 
    alert("No data processed yet!"); 
    return; 
  }
  const b = new Blob([processedText], {type:'text/plain'});
  const url = URL.createObjectURL(b);
  const a = document.createElement("a");
  a.href = url;
  a.download = "PTV_Report.txt";
  a.click();
  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
